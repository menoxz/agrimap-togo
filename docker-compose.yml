services:
  agrimap:
    image: agrimap-togo:latest
    container_name: agrimap
    restart: unless-stopped
    ports:
      - "3080:80"          # port interne → NPM proxie agrimap.favoured.cloud → :3080
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
