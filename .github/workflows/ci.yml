# ─────────────────────────────────────────────────────────────
# AgriMap Togo — CI/CD Pipeline
# Trigger: push sur main, pull requests
# Jobs: ETL + tests, Frontend + tests, i18n check
# Durée attendue : < 5 minutes
# ─────────────────────────────────────────────────────────────

name: AgriMap Togo CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:

  # ── Job 1 : ETL Pipeline + Tests ──────────────────────────
  etl:
    name: "ETL Pipeline + Tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ETL pipeline
        run: python etl/run_all.py

      - name: Run Python tests
        run: python -m pytest data/tests/ -v --tb=short || python -m pytest -v --tb=short

      - name: Verify GeoJSON outputs exist
        run: |
          for f in data/public/analysis/*.geojson; do
            echo "✓ $f ($(wc -c < "$f") bytes)"
          done
          for f in data/public/metadata/*.json; do
            echo "✓ $f ($(wc -c < "$f") bytes)"
          done

  # ── Job 2 : Frontend Build + Tests ───────────────────────
  frontend:
    name: "Frontend Build + Tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests (vitest)
        run: npm test

      - name: Build frontend (Vite)
        run: npm run build

      - name: Verify build output
        run: |
          echo "Build size:"
          du -sh dist/
          echo ""
          echo "Files:"
          find dist/ -type f | head -30

  # ── Job 3 : Vérification i18n ────────────────────────────
  i18n:
    name: "Vérification i18n"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run i18n check
        run: python scripts/check_i18n.py
