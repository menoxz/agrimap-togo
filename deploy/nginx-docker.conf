# nginx config allégée pour Docker (gzip + SPA fallback)
# Le SSL et le rate-limiting sont gérés par Nginx Proxy Manager en amont.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compression gzip
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/html text/plain text/css text/javascript
        application/javascript application/json application/geo+json
        image/svg+xml font/woff font/woff2;

    # Assets Vite (hash dans le nom) — cache 1 an
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Locales i18n — cache 1h
    location /locales/ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # GeoJSON data — cache 1h
    location /data/ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # SPA — toujours renvoyer index.html
    location / {
        try_files $uri $uri/ /index.html;
        expires 5m;
        add_header Cache-Control "public";
    }

    # Sécurité — bloquer les fichiers sensibles
    location ~ /\. { deny all; }
}
