# ─────────────────────────────────────────────────────────────
# AgriMap Togo — Nginx Configuration
# Déploiement : copier dans /etc/nginx/sites-available/agrimap
# puis : sudo ln -sf /etc/nginx/sites-available/agrimap /etc/nginx/sites-enabled/
#        sudo nginx -t && sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────────

# --- Compression gzip ---
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 256;
gzip_types
    text/html
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/geo+json
    application/xml
    image/svg+xml
    font/woff
    font/woff2;

# --- Redirect HTTP → HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name agrimap.favoured.cloud;

    # Rate limiting basique
    limit_req zone=login burst=10 nodelay;

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# --- HTTPS Server ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name agrimap.favoured.cloud;

    # ── SSL (Let's Encrypt) ─────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/agrimap.favoured.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agrimap.favoured.cloud/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/agrimap.favoured.cloud/chain.pem;

    # Modern TLS configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS (Strict Transport Security)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Rate Limiting ───────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=agrimap:10m rate=30r/s;
    limit_req zone=agrimap burst=50 nodelay;

    # ── Root directory ──────────────────────────────────────
    root /var/www/agrimap;
    index index.html;

    # ── Logs ────────────────────────────────────────────────
    access_log /var/log/nginx/agrimap_access.log;
    error_log  /var/log/nginx/agrimap_error.log;

    # ── Security Headers ──────────────────────────────────
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── GeoJSON / Data files (cache 1h) ────────────────────
    location /public/data/ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
        add_header X-Cache-Status $upstream_cache_status;
        # Compression activée pour les GeoJSON
        gzip_static on;
    }

    # ── Static assets (cache 1 an, immutable) ──────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Locales i18n (cache 1h) ────────────────────────────
    location /locales/ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # ── Service Worker (no cache) ──────────────────────────
    location = /service-worker.js {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── Favicon (cache 1j) ─────────────────────────────────
    location = /favicon.ico {
        expires 1d;
        access_log off;
        log_not_found off;
    }

    # ── Robots.txt ─────────────────────────────────────────
    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    # ── SPA — fallback to index.html ───────────────────────
    location / {
        try_files $uri $uri/ /index.html;

        # HTML: cache court (5 min)
        expires 5m;
        add_header Cache-Control "public";
    }

    # ── Deny access to hidden files ────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Deny access to sensitive files ─────────────────────
    location ~* (\.env|\.git|\.htaccess|composer\.json|package\.json)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}
